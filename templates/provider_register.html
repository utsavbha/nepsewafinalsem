<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Registration - NepSewa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 520px;
            padding: 40px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .register-btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .register-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .register-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            text-align: center;
            margin-top: 16px;
        }
        
        .back-home a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-home a:hover {
            color: #374151;
        }
        
        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🛠️ NepSewa</h1>
            <p>Join as a Service Provider</p>
        </div>
        
        <div class="info-box">
            ℹ️ Your account will be reviewed by our admin team before activation.
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" class="form-input" id="name" required placeholder="Your full name">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <input type="tel" class="form-input" id="phone" required placeholder="98XXXXXXXX">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address *</label>
                <input type="email" class="form-input" id="email" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label class="form-label">Password *</label>
                <input type="password" class="form-input" id="password" required placeholder="At least 6 characters">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Service Type *</label>
                    <select class="form-select" id="service" required>
                        <option value="">Select Service</option>
                        <option value="Home Cleaning">Home Cleaning</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electric Repair">Electric Repair</option>
                        <option value="AC Service">AC Service</option>
                        <option value="Maid Service">Maid Service</option>
                        <option value="Technician Service">Technician Service</option>
                        <option value="Hair Cutting">Hair Cutting</option>
                        <option value="Gardener">Gardener</option>
                        <option value="Makeup Artist">Makeup Artist</option>
                        <option value="Photographer">Photographer</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Location *</label>
                    <select class="form-select" id="location" required>
                        <option value="">Select Location</option>
                        <option value="Butwal">Butwal</option>
                        <option value="Tilottama">Tilottama</option>
                        <option value="Bhairahawa">Bhairahawa</option>
                        <option value="Chitwan">Chitwan</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Experience (years) *</label>
                <input type="number" class="form-input" id="experience" required min="0" max="30" value="1">
            </div>
            
            <div class="form-group">
                <label class="form-label">Bio / About You</label>
                <textarea class="form-textarea" id="bio" placeholder="Tell us about your skills and experience..."></textarea>
            </div>
            
            <button type="submit" class="register-btn" id="registerBtn">
                Register as Provider
            </button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/provider/login">Sign in here</a>
        </div>
        
        <div class="back-home">
            <a href="/">← Back to Home</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value.trim(),
                service: document.getElementById('service').value,
                location: document.getElementById('location').value,
                experience: parseInt(document.getElementById('experience').value),
                bio: document.getElementById('bio').value.trim()
            };
            
            // Validation
            if (!formData.name || !formData.email || !formData.password || !formData.phone || !formData.service || !formData.location) {
                showError('Please fill in all required fields');
                return;
            }
            
            if (formData.password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';
            hideMessages();
            
            try {
                const response = await fetch('/api/provider/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess(data.message);
                    form.reset();
                    setTimeout(() => {
                        window.location.href = '/provider/login';
                    }, 2000);
                } else {
                    showError(data.message || 'Registration failed');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Register as Provider';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register as Provider';
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
        
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }
        
        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }
    </script>
</body>
</html>
