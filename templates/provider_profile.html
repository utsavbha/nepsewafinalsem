<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - NepSewa Provider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1f2937;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .navbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        
        .navbar-menu {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        
        .nav-link {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-link:hover, .nav-link.active {
            color: #667eea;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .logout-btn:hover {
            background: #dc2626;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px;
        }
        
        .header {
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #111827;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #6b7280;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 32px;
        }
        
        .form-section {
            margin-bottom: 32px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-input:disabled, .form-select:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }
        
        .availability-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        .day-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .day-checkbox:hover {
            border-color: #667eea;
            background: #f9fafb;
        }
        
        .day-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .day-checkbox.checked {
            background: #eff6ff;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1e40af;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🛠️ NepSewa</div>
        <div class="navbar-menu">
            <a href="/provider/dashboard" class="nav-link">Dashboard</a>
            <a href="/provider/profile" class="nav-link active">My Profile</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <div class="header">
            <h1>Edit Your Profile</h1>
            <p>Update your information and availability</p>
        </div>
        
        <div class="card">
            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>
            
            <div id="formContent" class="loading">Loading profile...</div>
        </div>
    </div>
    
    <script>
        let providerData = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProviderProfile();
        });
        
        async function loadProviderProfile() {
            try {
                const response = await fetch('/api/provider/me');
                const data = await response.json();
                
                if (data.success) {
                    providerData = data.provider;
                    renderForm();
                } else {
                    if (data.message === 'Not logged in') {
                        window.location.href = '/provider/login';
                    } else {
                        showError('Error loading profile');
                    }
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                showError('Network error loading profile');
            }
        }
        
        function renderForm() {
            const availability = providerData.availability || [];
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            
            const formHTML = `
                <form id="profileForm">
                    <div class="form-section">
                        <h3 class="section-title">Basic Information</h3>
                        
                        <div class="info-box">
                            ℹ️ Service type and email cannot be changed. Contact admin if you need to update these.
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-input" id="name" value="${providerData.name}" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-input" id="phone" value="${providerData.phone}" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Email (Cannot be changed)</label>
                                <input type="email" class="form-input" value="${providerData.email}" disabled>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Service Type (Cannot be changed)</label>
                                <input type="text" class="form-input" value="${providerData.service}" disabled>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Location</label>
                                <select class="form-select" id="location" required>
                                    <option value="Kathmandu" ${providerData.location === 'Kathmandu' ? 'selected' : ''}>Kathmandu</option>
                                    <option value="Lalitpur" ${providerData.location === 'Lalitpur' ? 'selected' : ''}>Lalitpur</option>
                                    <option value="Bhaktapur" ${providerData.location === 'Bhaktapur' ? 'selected' : ''}>Bhaktapur</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Years of Experience</label>
                                <input type="number" class="form-input" id="experience" value="${providerData.experience}" min="0" max="30" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Profile Image URL</label>
                            <input type="url" class="form-input" id="image" value="${providerData.image || ''}" placeholder="https://...">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Bio / About You</label>
                            <textarea class="form-textarea" id="bio" placeholder="Tell customers about your skills and experience...">${providerData.bio || ''}</textarea>
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h3 class="section-title">Availability</h3>
                        <p style="color: #6b7280; margin-bottom: 16px; font-size: 13px;">Select the days you're available to work</p>
                        
                        <div class="availability-grid">
                            ${days.map(day => `
                                <label class="day-checkbox ${availability.includes(day) ? 'checked' : ''}" onclick="toggleDay(this)">
                                    <input type="checkbox" name="availability" value="${day}" ${availability.includes(day) ? 'checked' : ''}>
                                    <span>${day}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='/provider/dashboard'">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
                    </div>
                </form>
            `;
            
            document.getElementById('formContent').innerHTML = formHTML;
            
            // Add form submit handler
            document.getElementById('profileForm').addEventListener('submit', handleSubmit);
        }
        
        function toggleDay(label) {
            label.classList.toggle('checked');
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';
            hideMessages();
            
            // Collect form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                location: document.getElementById('location').value,
                experience: parseInt(document.getElementById('experience').value),
                image: document.getElementById('image').value.trim(),
                bio: document.getElementById('bio').value.trim(),
                availability: Array.from(document.querySelectorAll('input[name="availability"]:checked')).map(cb => cb.value)
            };
            
            try {
                const response = await fetch('/api/provider/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('Profile updated successfully!');
                    setTimeout(() => {
                        window.location.href = '/provider/dashboard';
                    }, 1500);
                } else {
                    showError(data.message || 'Failed to update profile');
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Changes';
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showError('Network error. Please try again.');
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Changes';
            }
        }
        
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function hideMessages() {
            document.getElementById('successMessage').classList.remove('show');
            document.getElementById('errorMessage').classList.remove('show');
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/provider/logout';
            }
        }
    </script>
</body>
</html>
