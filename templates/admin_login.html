<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NepSewa — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; justify-content:center; align-items:center; }
.box {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
  border-radius:18px; padding:50px 40px; width:380px; text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
h2 { font-size:1.5rem; margin-bottom:8px; }
p  { color:#94a3b8; font-size:0.9rem; margin-bottom:28px; }
input[type=password] {
  width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);
  background:rgba(15,23,42,0.6); color:#fff; font-size:14px; outline:none; margin-bottom:16px;
  transition:0.3s;
}
input[type=password]:focus { border-color:#6366f1; box-shadow:0 0 12px rgba(99,102,241,0.3); }
button {
  width:100%; padding:14px; border:none; border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#06b6d4); color:white;
  font-size:15px; font-weight:600; cursor:pointer; transition:0.3s;
}
button:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(99,102,241,0.4); }
.error { color:#ef4444; font-size:0.85rem; margin-bottom:14px; background:rgba(239,68,68,0.1); padding:10px; border-radius:8px; }
</style>
</head>
<body>
<div class="box">
  <h2>🔐 Admin Access</h2>
  <p>Enter admin password to access dashboard</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/admin/login">
    <input type="password" name="password" placeholder="Admin password" required autofocus>
    <button type="submit">Enter Dashboard</button>
  </form>
</div>
</body>
</html>
