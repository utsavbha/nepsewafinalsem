<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed — NepSewa</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; justify-content:center; align-items:center; }
.card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:50px 40px; max-width:440px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
.icon { font-size:4rem; margin-bottom:16px; }
h2 { font-size:1.6rem; margin-bottom:10px; color:#ef4444; }
p { color:#94a3b8; font-size:0.9rem; line-height:1.6; margin-bottom:8px; }
.booking-id { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:10px 20px; margin:16px 0; font-size:0.9rem; color:#ef4444; }
.btn-row { display:flex; gap:12px; justify-content:center; margin-top:24px; }
.btn { padding:12px 24px; border-radius:10px; font-weight:600; text-decoration:none; font-size:0.9rem; }
.btn-primary { background:linear-gradient(135deg,#6366f1,#06b6d4); color:white; }
.btn-secondary { border:1px solid #334155; color:#94a3b8; }
</style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h2>Payment Failed</h2>
    <p>Your payment could not be completed. Your booking is saved — you can try again or choose cash on arrival.</p>
    {% if booking_id %}
    <div class="booking-id">Booking ID: {{ booking_id }}</div>
    {% endif %}
    <p style="margin-top:12px;color:#64748b;font-size:0.8rem;">No charges have been made to your account.</p>
    <div class="btn-row">
        <a href="/services" class="btn btn-primary">Try Again</a>
        <a href="/" class="btn btn-secondary">Go Home</a>
    </div>
</div>
</body>
</html>
